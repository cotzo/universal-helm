# -- Workload type: Deployment | StatefulSet | CronJob | Job | DaemonSet
workloadType: Deployment

# -- Override the chart name
nameOverride: ""
# -- Override the full release name
fullnameOverride: ""

# -- Global settings applied to all resources
global:
  # -- Labels added to all resources
  labels: {}
  # -- Annotations added to all resources
  annotations: {}

# =============================================================================
# Infrastructure Settings
# =============================================================================

# -- Node label key mapping for your cluster.
# Maps friendly names to actual Kubernetes node label keys. Use these names in
# topologySpreadConstraints.topologyKey and other scheduling references.
# Override defaults to match your cluster's labeling conventions.
infraSettings:
  nodeLabels:
    # -- Region topology label key
    topologyRegion: topology.kubernetes.io/region
    # -- Zone topology label key
    topologyZone: topology.kubernetes.io/zone
    # -- Rack topology label key (if applicable)
    topologyRack: topology.kubernetes.io/rack
    # -- Node pool label key
    nodePool: node.cluster.x-k8s.io/node-pool
    # -- OS label key
    os: kubernetes.io/os
    # -- Architecture label key
    arch: kubernetes.io/arch
    # -- Node type label key (e.g. node.kubernetes.io/instance-type)
    nodeType: node.kubernetes.io/instance-type

# =============================================================================
# Argo CD
# =============================================================================

argocd:
  # -- Auto-assign sync wave annotations to resources for ordered deployment.
  # When enabled, each resource type gets a default wave (config:-5, rbac:-3,
  # persistence:-2, security:-1, workloads:0, services:1, ingresses:2,
  # monitoring:3, dashboards:5). Per-resource syncWave field always takes priority.
  syncWaves:
    enabled: false
  # -- Sync options applied to all resources.
  # Renders argocd.argoproj.io/sync-options annotation.
  syncOptions: []
  # - ServerSideApply=true
  # - SkipDryRunOnMissingResource=true

# =============================================================================
# Node Settings
# =============================================================================

# -- Node targeting settings. Always lists. Rendered as nodeAffinity matchExpressions.
nodeTargeting:
  # -- Pod placement restriction across nodes.
  # differentNodes (default): replicas spread across different nodes (podAntiAffinity)
  # sameNode: all replicas on the same node (podAffinity)
  # none: no placement preference
  restrictions: differentNodes
  # -- Target OS(es). Uses infraSettings.nodeLabels.os as the label key.
  os: []
  # - linux
  # -- Target architecture(s). Uses infraSettings.nodeLabels.arch as the label key.
  arch: []
  # - amd64
  # - arm64
  # -- Target region(s). Uses infraSettings.nodeLabels.topologyRegion as the label key.
  regions: []
  # - us-east-1
  # - eu-west-1
  # -- Target zone(s). Uses infraSettings.nodeLabels.topologyZone as the label key.
  zones: []
  # - us-east-1a
  # - us-east-1b
  # -- Target node type(s). Uses infraSettings.nodeLabels.nodeType as the label key.
  nodeTypes: []
  # - m5.xlarge
  # - c5.2xlarge
  # -- Target node pool(s). Uses infraSettings.nodeLabels.nodePool as the label key.
  nodePools: []
  # - general-purpose
  # - gpu

# =============================================================================
# Containers
# =============================================================================

# -- Containers map (key = container name, value = container spec).
# All containers follow the same schema. Each container declares which
# configMaps/secrets it needs via configMapMounts/secretMounts/configMapEnvFrom/secretEnvFrom.
containers: {}
# app:
#   image:
#     repository: nginx
#     tag: "1.27"
#     pullPolicy: IfNotPresent
#   command: []
#   args: []
#   ports:
#     http:
#       port: 80
#       protocol: TCP  # optional, defaults to TCP
#     grpc:
#       port: 9090
#   env: {}
#   # Literal value — key = env var name
#   #   APP_ENV:
#   #     value: "production"
#   # From pod field
#   #   POD_NAME:
#   #     valueFrom:
#   #       fieldRef:
#   #         fieldPath: metadata.name
#   # From chart-managed configMap key (auto-prefixed)
#   #   LOG_LEVEL:
#   #     valueFrom:
#   #       configMapKeyRef:
#   #         name: app-config
#   #         key: log-level
#   # From chart-managed secret key
#   #   DB_PASSWORD:
#   #     valueFrom:
#   #       secretKeyRef:
#   #         name: db-creds
#   #         key: password
#   # From external resource (NOT prefixed)
#   #   EXT_VAR:
#   #     valueFrom:
#   #       secretKeyRef:
#   #         name: external-secret
#   #         key: api-key
#   #         external: true
#   # Bulk inject from chart-managed configMap (→ envFrom) — key is identifier
#   #   bulk-app-config:
#   #     configMapRef:
#   #       name: app-config
#   # Bulk inject from external secret
#   #   bulk-ext-secret:
#   #     secretRef:
#   #       name: external-secret
#   #       external: true
#   resources: {}
#   # requests:
#   #   cpu: 100m
#   #   memory: 128Mi
#   # limits:
#   #   cpu: 500m
#   #   memory: 256Mi
#   # -- In-place resize policy (K8s 1.35+). Controls restart behavior on resource changes.
#   resizePolicy: []
#   # - resourceName: cpu
#   #   restartPolicy: NotRequired
#   # - resourceName: memory
#   #   restartPolicy: RestartContainer
#   # -- Restart policy for init containers. Set to "Always" for native sidecar (K8s 1.33+).
#   restartPolicy: ""
#   securityContext: {}
#   healthChecks:
#     liveness:
#       httpGet:
#         path: /healthz
#         port: http
#       initialDelaySeconds: 10
#       periodSeconds: 10
#     readiness:
#       httpGet:
#         path: /ready
#         port: http
#       initialDelaySeconds: 5
#       periodSeconds: 5
#     startup:
#       httpGet:
#         path: /healthz
#         port: http
#       failureThreshold: 30
#       periodSeconds: 10
#   lifecycle: {}
#   workingDir: ""
#   # -- Unified mounts list. Each entry has a path and one source field.
#   mounts: []
#   # Chart-managed configMap
#   # - path: /etc/config
#   #   configMap: app-config    # key from configMaps map, auto-prefixed
#   #   readOnly: true
#   #   # subPath: ""
#   #   # items: []
#   #   # defaultMode: 0644
#   # Chart-managed secret
#   # - path: /etc/secrets
#   #   secret: app-credentials  # key from secrets map, auto-prefixed
#   #   readOnly: true
#   # Chart-managed persistence
#   # - path: /data
#   #   persistence: data        # key from persistence map
#   # Existing pod volume (from podSettings.volumes)
#   # - path: /tmp
#   #   volume: tmp
#   # External configMap (not managed by this chart, NOT prefixed)
#   # - path: /etc/external
#   #   configMap: ext-config
#   #   external: true

# -- Init containers map (key = container name, value = container spec).
# Same schema as containers. Processed in alphabetical key order.
# Auto-wired volumeMounts/envFrom are NOT injected into init containers.
initContainers: {}
# 01-migrate:
#   image:
#     repository: my-app
#     tag: "1.0.0"
#   command: ["./migrate"]

# =============================================================================
# Pod Settings
# =============================================================================

# -- Pod-level settings applied to the pod template spec.
podSettings:
  # -- Image pull secrets
  imagePullSecrets: []
  # - name: my-registry-secret

  # -- Pod-level security context
  securityContext: {}
  # fsGroup: 1000
  # runAsUser: 1000
  # runAsGroup: 1000

  # -- Additional pod annotations
  annotations: {}
  # -- Additional pod labels
  labels: {}

  # -- Explicit pod-level volumes
  volumes: []
  # - name: tmp
  #   emptyDir: {}

  # -- Node selector
  nodeSelector: {}

  # -- Tolerations
  tolerations: []

  # -- Affinity rules
  affinity: {}
  # podAntiAffinity:
  #   preferredDuringSchedulingIgnoredDuringExecution:
  #     - weight: 100
  #       podAffinityTerm:
  #         labelSelector:
  #           matchExpressions:
  #             - key: app.kubernetes.io/name
  #               operator: In
  #               values:
  #                 - my-app
  #         topologyKey: kubernetes.io/hostname

  # -- Topology spread constraints (map of name -> config).
  # labelSelector defaults to chart's selectorLabels if not specified.
  topologySpreadConstraints: {}
  # zone-spread:
  #   maxSkew: 1
  #   topologyKey: topology.kubernetes.io/zone
  #   whenUnsatisfiable: DoNotSchedule
  # node-spread:
  #   maxSkew: 1
  #   topologyKey: kubernetes.io/hostname
  #   whenUnsatisfiable: ScheduleAnyway

  # -- Priority class name
  priorityClassName: ""

  # -- Termination grace period in seconds
  terminationGracePeriodSeconds: ""

  # -- DNS policy
  dnsPolicy: ""

  # -- DNS config
  dnsConfig: {}

  # -- Enable host networking
  hostNetwork: false

  # -- Restart policy (defaults to OnFailure for Job/CronJob)
  restartPolicy: ""

# =============================================================================
# Networking (Services, Ingresses, Gateway API, OAuth2 Proxies)
# =============================================================================

networking:
  # -- Services to create (map of name -> config).
  # Services are named <fullname>-<key>. Not created for CronJob/Job workloads.
  # For StatefulSets, a headless service is auto-generated from all service ports.
  services: {}
# http:
#   type: ClusterIP  # ClusterIP | NodePort | LoadBalancer | ExternalName
#   headless: false            # set true for clusterIP: None
#   ports:
#     http:                    # key = port name
#       port: 80
#       containerPort: http    # container port name, defaults to port key name
#       # protocol: TCP        # defaults to TCP
#       # nodePort: 30080      # only for NodePort/LoadBalancer
#   # clusterIP: ""
#   # loadBalancerIP: ""
#   # loadBalancerSourceRanges: []
#   # externalTrafficPolicy: ""  # Cluster | Local
#   # trafficDistribution: ""    # PreferSameNode | PreferSameZone (K8s 1.35+)
#   # sessionAffinity: ""
#   # ipFamilyPolicy: ""
#   # ipFamilies: []
#   # publishNotReadyAddresses: false
#   # selectorLabels: {}  # extra selector labels (merged with default)
#   annotations: {}
#   labels: {}
# grpc:
#   type: ClusterIP
#   ports:
#     - name: grpc
#       port: 9090
#       targetPort: 9090
# metrics:
#   type: ClusterIP
#   ports:
#     - name: metrics
#       port: 9091
#       targetPort: 9091
#   annotations:
#     prometheus.io/scrape: "true"

  # =============================================================================
  # OAuth2 Proxies
  # =============================================================================

  # -- OAuth2 proxies (map of name -> config).
  # Each proxy gets its own Deployment + Service, created only if referenced by
  # an ingress or route via the oauth2Proxy field.
  # Traffic flow: Ingress/Route → oauth2-proxy → original backend service.
  oauth2Proxies: {}
# corporate:
#   mode: sidecar                # sidecar (default) | deployment
#   image:
#     repository: quay.io/oauth2-proxy/oauth2-proxy
#     tag: v7.7.0
#   replicas: 1                  # only for deployment mode
#   port: 4180
#   provider: oidc               # oidc | google | github | azure | gitlab | etc.
#   issuerUrl: https://auth.corp.example.com
#   emailDomains:
#     - corp.example.com
#   # upstream: ""               # sidecar: auto-derived as localhost:<container-port>
#   #                            # deployment: REQUIRED (e.g., http://<fullname>-<service>:<port>)
#   extraArgs: {}                # key-value → --key=value
#   args: []                     # additional raw args
#   env:                         # same unified env map as containers
#     CLIENT_ID:
#       valueFrom:
#         secretKeyRef:
#           name: oauth2-corp-secret
#           key: client-id
#           external: true
#     CLIENT_SECRET:
#       valueFrom:
#         secretKeyRef:
#           name: oauth2-corp-secret
#           key: client-secret
#           external: true
#     COOKIE_SECRET:
#       valueFrom:
#         secretKeyRef:
#           name: oauth2-corp-secret
#           key: cookie-secret
#           external: true
#   resources: {}
#   securityContext: {}
#   annotations: {}
#   labels: {}

  # =============================================================================
  # Ingresses
  # =============================================================================

  # -- Ingresses to create (map of name -> config).
  # Ingresses are named <fullname>-<key>. Path backends default to the first
  # enabled service unless serviceName/servicePort are specified per path.
  # Set oauth2Proxy to a key from oauth2Proxies to route through the proxy.
  ingresses: {}
# public:
#   oauth2Proxy: corporate         # routes traffic through oauth2Proxies.corporate
#   className: nginx
#   annotations:
#     cert-manager.io/cluster-issuer: letsencrypt-prod
#   labels: {}
#   hosts:
#     - host: app.example.com
#       paths:
#         - path: /
#           pathType: Prefix
#           # serviceName: <fullname>-http  # optional override
#           # servicePort: 80               # optional override
#   tls:
#     - secretName: app-tls
#       hosts:
#         - app.example.com
#   defaultBackend: {}
# internal:
#   className: nginx-internal
#   annotations:
#     nginx.ingress.kubernetes.io/whitelist-source-range: "10.0.0.0/8"
#   hosts:
#     - host: app.internal.example.com
#       paths:
#         - path: /
#           pathType: Prefix

  # =============================================================================
  # Gateway API Routes
  # =============================================================================

  # -- Gateway API configuration.
  # Gateways are NOT created by this chart — they are pre-existing infrastructure.
  # Routes reference Gateways via parentRefs.
  gatewayApi:
    # -- Routes to create (map of name -> config).
    # Each route specifies its kind to determine the CRD type.
    #   kind: HTTPRoute | GRPCRoute | TLSRoute | TCPRoute | UDPRoute
    #
    # HTTPRoute/GRPCRoute/TLSRoute use gateway.networking.k8s.io/v1
    # TCPRoute/UDPRoute use gateway.networking.k8s.io/v1alpha2
    routes: {}
# http:
#   kind: HTTPRoute                    # defaults to HTTPRoute
#   parentRefs:
#     - name: my-gateway
#       namespace: gateway-system       # optional
#       sectionName: https              # optional — gateway listener name
#   hostnames:
#     - app.example.com
#   rules:
#     - matches:
#         - path:
#             type: PathPrefix
#             value: /
#       backendRefs:
#         - name: http                  # key from services map, auto-prefixed
#           port: 80
#       filters: []                     # optional: requestHeaderModifier, requestRedirect, etc.
#       timeouts: {}                    # optional: request, backendRequest
#   # -- Policies attached to this route
#   policies:
#     # -- Envoy Gateway BackendTrafficPolicy (gateway.envoyproxy.io/v1alpha1)
#     envoy:
#       loadBalancer:
#         type: LeastRequest            # RoundRobin | LeastRequest | Random | ConsistentHash
#       circuitBreaker:
#         maxConnections: 1024
#         maxPendingRequests: 1024
#         maxParallelRequests: 1024
#       retry:
#         numRetries: 3
#       timeout:
#         tcp:
#           connectTimeout: 10s
#         http:
#           connectionIdleTimeout: 60s
#       rateLimit:
#         type: Local
#         rules:
#           - limit:
#               requests: 100
#               unit: Second
#       healthCheck:
#         active:
#           type: HTTP
#           http:
#             path: /healthz
#       tcpKeepalive:
#         probes: 3
#         idleTime: 60s
#         interval: 10s
#       faultInjection:
#         delay:
#           fixedDelay: 100ms
#           percentage: 1
#       useClientProtocol: false
#       # compression: []
#       # http2: {}
#       # dns: {}
#       # proxyProtocol: {}
#       # connection: {}
#   annotations: {}
#   labels: {}
# grpc:
#   kind: GRPCRoute
#   parentRefs:
#     - name: my-gateway
#   hostnames:
#     - grpc.example.com
#   rules:
#     - matches:
#         - method:
#             service: my.service
#             method: GetItem
#       backendRefs:
#         - name: grpc
#           port: 9090
# tls-passthrough:
#   kind: TLSRoute
#   parentRefs:
#     - name: my-gateway
#       sectionName: tls
#   hostnames:
#     - secure.example.com
#   rules:
#     - backendRefs:
#         - name: http
#           port: 443
# tcp:
#   kind: TCPRoute
#   parentRefs:
#     - name: my-gateway
#       sectionName: postgres
#   rules:
#     - backendRefs:
#         - name: postgres
#           port: 5432
# udp:
#   kind: UDPRoute
#   parentRefs:
#     - name: my-gateway
#       sectionName: dns
#   rules:
#     - backendRefs:
#         - name: dns
#           port: 53

  # =============================================================================
  # =============================================================================
  # Certificates (cert-manager)
  # =============================================================================

  # -- TLS Certificates (map of name -> config).
  # Creates cert-manager Certificate resources. Requires cert-manager installed.
  # secretName defaults to <fullname>-<key>-tls if not specified.
  certificates: {}
  # app-tls:
  #   issuerRef:
  #     name: letsencrypt-prod
  #     kind: ClusterIssuer          # ClusterIssuer | Issuer
  #   dnsNames:
  #     - app.example.com
  #     - www.example.com
  #   # secretName: ""               # defaults to <fullname>-<key>-tls
  #   # mount:
  #   #   path: /etc/tls             # auto-mount cert to all containers at this path
  #   # duration: 2160h              # 90 days
  #   # renewBefore: 360h            # 15 days
  #   # privateKey:
  #   #   algorithm: RSA
  #   #   size: 2048
  #   #   rotationPolicy: Always
  #   annotations: {}
  #   labels: {}

  # =============================================================================
  # Network Policies
  # =============================================================================

  # -- NetworkPolicies (map of name -> config).
  # podSelector defaults to chart's selectorLabels if not specified.
  # No external dependencies — uses built-in networking.k8s.io/v1.
  networkPolicies: {}
  # deny-all:
  #   policyTypes:
  #     - Ingress
  #     - Egress
  # allow-ingress:
  #   policyTypes:
  #     - Ingress
  #   ingress:
  #     - from:
  #         - namespaceSelector:
  #             matchLabels:
  #               name: ingress-nginx
  #       ports:
  #         - protocol: TCP
  #           port: 80
  # allow-dns:
  #   policyTypes:
  #     - Egress
  #   egress:
  #     - to:
  #         - namespaceSelector: {}
  #       ports:
  #         - protocol: UDP
  #           port: 53
  #   annotations: {}
  #   labels: {}

  # =============================================================================
  # Istio
  # =============================================================================

  # -- Istio resources. Requires Istio CRDs installed in the cluster.
  istio:
    # -- VirtualServices (map of name -> config)
    # destination.host references a key from networking.services (auto-prefixed).
    # Set external: true on a destination to skip prefixing for cross-namespace FQDNs.
    virtualServices: {}
    # http:
    #   hosts:
    #     - app.example.com
    #   gateways:
    #     - istio-system/my-gateway
    #   http:
    #     - match:
    #         - uri:
    #             prefix: /
    #       route:
    #         - destination:
    #             host: http              # auto-prefixed to <fullname>-http
    #             port:
    #               number: 80
    #           weight: 90
    #         - destination:
    #             host: http-canary
    #             port:
    #               number: 80
    #           weight: 10
    #       timeout: 10s
    #       retries:
    #         attempts: 3
    #         perTryTimeout: 2s
    #   annotations: {}
    #   labels: {}

    # -- DestinationRules (map of name -> config)
    # host references a key from networking.services (auto-prefixed).
    # Set externalHost: true to skip prefixing for cross-namespace FQDNs.
    destinationRules: {}
    # http:
    #   host: http                        # auto-prefixed to <fullname>-http
    #   trafficPolicy:
    #     loadBalancer:
    #       simple: LEAST_REQUEST
    #     connectionPool:
    #       tcp:
    #         maxConnections: 100
    #     outlierDetection:
    #       consecutive5xxErrors: 5
    #       interval: 30s
    #       baseEjectionTime: 30s
    #   subsets:
    #     - name: v1
    #       labels:
    #         version: v1
    #   annotations: {}
    #   labels: {}

    # -- PeerAuthentication (map of name -> config)
    # selector defaults to chart's selectorLabels if not specified.
    peerAuthentication: {}
    # default:
    #   mtls:
    #     mode: STRICT              # PERMISSIVE | STRICT | DISABLE | UNSET
    #   # selector:                 # omit to use chart's selectorLabels
    #   #   matchLabels: {}
    #   # portLevelMtls:
    #   #   8080:
    #   #     mode: PERMISSIVE
    #   annotations: {}
    #   labels: {}

    # -- AuthorizationPolicies (map of name -> config)
    # selector defaults to chart's selectorLabels if not specified.
    authorizationPolicies: {}
    # allow-frontend:
    #   action: ALLOW               # ALLOW | DENY | CUSTOM | AUDIT
    #   rules:
    #     - from:
    #         - source:
    #             principals: ["cluster.local/ns/default/sa/frontend"]
    #       to:
    #         - operation:
    #             methods: ["GET", "POST"]
    #             paths: ["/api/*"]
    #   annotations: {}
    #   labels: {}

# =============================================================================
# Configuration (ConfigMaps, Secrets, External Secrets)
# =============================================================================

config:
  # -- ConfigMaps to create (map of name -> config).
  # Mounting and envFrom injection is configured per container via
  # configMapMounts and configMapEnvFrom in the container spec.
  # Stakater Reloader annotations are auto-generated (set reloaderEnabled: false to exclude).
  configMaps: {}
  # app-config:
  #   data:
  #     config.yaml: |
  #       key: value
  #   # reloaderEnabled: true        # include in Stakater Reloader annotations (default: true)
  #   annotations: {}
  #   labels: {}

  # -- Secrets to create (map of name -> config).
  # Mounting and envFrom injection is configured per container via
  # secretMounts and secretEnvFrom in the container spec.
  # Stakater Reloader annotations are auto-generated (set reloaderEnabled: false to exclude).
  secrets: {}
  # app-secret:
  #   type: Opaque
  #   stringData:
  #     password: "s3cret"
  #   # data: {}  # base64-encoded
  #   # -- Auto-generate random values via ESO Password generators (ArgoCD-safe).
  #   # Each key creates a Password generator + ExternalSecret with creationPolicy: Merge.
  #   # generate:
  #   #   api-key:
  #   #     length: 32           # default: 32
  #   #     # digits: 6          # number of digits (default: 25% of length)
  #   #     # symbols: 0         # number of symbols (default: 25% of length)
  #   #     # symbolCharacters: "!@#$%"
  #   #     # noUpper: false
  #   #     # allowRepeat: false
  #   #     # encoding: raw      # raw | base64 | base64url | base32 | hex
  #   #   webhook-secret:
  #   #     length: 64
  #   #     symbols: 0
  #   #     encoding: hex
  #   # generateRefreshInterval: "0"  # "0" = generate once, never rotate
  #   annotations: {}
  #   labels: {}

  # -- External secrets (map of name -> config)
  externalSecrets: {}
  # cloud-credentials:
  #   refreshInterval: 1h
  #   secretStoreRef:
  #     name: aws-secrets-manager
  #     kind: SecretStore
  #   target:
  #     name: ""  # defaults to <fullname>-<key>
  #     creationPolicy: Owner
  #   data:
  #     - secretKey: password
  #       remoteRef:
  #         key: /prod/app/password
  #   annotations: {}
  #   labels: {}

# =============================================================================
# Persistence
# =============================================================================

# -- Persistent volumes (map of name -> config).
# For StatefulSets, these become volumeClaimTemplates.
# For other workloads, standalone PVCs are created.
# Mounting is configured per container via the mounts list.
persistence: {}
# data:
#   storageClass: ""  # use "-" for empty storageClassName
#   accessModes:
#     - ReadWriteOnce
#   size: 10Gi
#   existingClaim: ""  # use existing PVC instead of creating one
#   annotations: {}
#   labels: {}

# =============================================================================
# Autoscaling (HPA)
# =============================================================================

autoscaling:
  # -- HPA configuration (not applicable to CronJob, Job, DaemonSet)
  hpa:
    enabled: false
    # -- Minimum replicas
    minReplicas: 1
    # -- Maximum replicas
    maxReplicas: 10
    # -- HPA metrics (v2 API)
    metrics: []
    # - type: Resource
    #   resource:
    #     name: cpu
    #     target:
    #       type: Utilization
    #       averageUtilization: 80
    # -- HPA scaling behavior
    behavior: {}
    # scaleDown:
    #   stabilizationWindowSeconds: 300
    # -- HPA annotations
    annotations: {}
    # -- HPA labels
    labels: {}

  # -- VPA configuration (not applicable to CronJob, Job)
  # Can be used alongside HPA — VPA manages requests, HPA manages replicas.
  # Set controlledValues: RequestsOnly when combining with HPA.
  vpa:
    enabled: false
    # -- Update policy: Off (dry-run), Initial (create only), Auto (recreate pods)
    updatePolicy: {}
    # updateMode: Auto
    # minReplicas: 2
    # -- Per-container resource constraints
    resourcePolicy: {}
    # containerPolicies:
    #   - containerName: "*"
    #     mode: Auto
    #     minAllowed:
    #       cpu: 100m
    #       memory: 50Mi
    #     maxAllowed:
    #       cpu: 1000m
    #       memory: 500Mi
    #     controlledResources: ["cpu", "memory"]
    #     controlledValues: RequestsOnly     # use RequestsOnly with HPA
    # -- Custom recommender
    recommenders: []
    # -- VPA annotations
    annotations: {}
    # -- VPA labels
    labels: {}

  # -- KEDA configuration (not applicable to CronJob, DaemonSet)
  # Creates a ScaledObject for Deployment/StatefulSet/Rollout, or a ScaledJob for Job.
  # Cannot be used together with autoscaling.hpa (they would conflict)
  keda:
    enabled: false
    # -- Minimum replicas
    minReplicaCount: 1
    # -- Maximum replicas
    maxReplicaCount: 10
    # -- Polling interval in seconds
    pollingInterval: ""
    # -- Cooldown period in seconds
    cooldownPeriod: ""
    # -- Number of replicas when idle (0 = scale to zero)
    idleReplicaCount: ""
    # -- Fallback configuration
    fallback: {}
    # failureThreshold: 3
    # replicas: 5
    # -- Advanced configuration (HPA settings, restore to original replica count, scaling modifiers)
    advanced: {}
    # horizontalPodAutoscalerConfig:
    #   behavior:
    #     scaleDown:
    #       stabilizationWindowSeconds: 300
    # restoreToOriginalReplicaCount: true
    # scalingModifiers:
    #   formula: ""
    #   target: ""
    #   activationTarget: ""
    #   metricType: ""
    # -- KEDA triggers (required when enabled)
    triggers: []
    # - type: prometheus
    #   metadata:
    #     serverAddress: http://prometheus:9090
    #     query: sum(rate(http_requests_total{deployment="my-app"}[2m]))
    #     threshold: "100"
    # - type: cron
    #   metadata:
    #     timezone: Europe/Bucharest
    #     start: "0 8 * * *"
    #     end: "0 18 * * *"
    #     desiredReplicas: "5"
    # -- ScaledJob: successful jobs history limit
    successfulJobsHistoryLimit: ""
    # -- ScaledJob: failed jobs history limit
    failedJobsHistoryLimit: ""
    # -- ScaledJob: scaling strategy
    scalingStrategy: {}
    # strategy: default           # default, custom, accurate
    # customScalingQueueLengthDeduction: 1
    # customScalingRunningJobPercentage: "0.5"
    # pendingPodConditions: []
    # multipleScalersCalculation: ""
    # -- ScaledObject/ScaledJob annotations
    annotations: {}
    # -- ScaledObject/ScaledJob labels
    labels: {}

# =============================================================================
# Pod Disruption Budget
# =============================================================================

pdb:
  # -- Enable PDB (not applicable to CronJob, Job)
  enabled: false
  # -- Minimum available pods (number or percentage)
  minAvailable: ""
  # -- Maximum unavailable pods (number or percentage)
  maxUnavailable: ""
  # -- Unhealthy pod eviction policy
  unhealthyPodEvictionPolicy: ""
  # -- PDB annotations
  annotations: {}
  # -- PDB labels
  labels: {}

# =============================================================================
# RBAC
# =============================================================================

rbac:
  # -- Service account configuration
  serviceAccount:
    # -- Create a service account
    create: true
    # -- Service account name (defaults to fullname)
    name: ""
    # -- Service account annotations
    annotations: {}
    # -- Service account labels
    labels: {}
    # -- Automount service account token
    # automountServiceAccountToken: true
    # -- Image pull secrets for the service account
    imagePullSecrets: []

  # -- Roles to create (map of name -> config). Named <fullname>-<key>.
  roles: {}
  # configmap-reader:
  #   rules:
  #     - apiGroups: [""]
  #       resources: ["configmaps"]
  #       verbs: ["get", "list", "watch"]
  #   annotations: {}
  #   labels: {}

  # -- ClusterRoles to create (map of name -> config). Named <fullname>-<key>.
  clusterRoles: {}
  # node-reader:
  #   rules:
  #     - apiGroups: [""]
  #       resources: ["nodes"]
  #       verbs: ["get", "list", "watch"]

  # -- RoleBindings to create (map of name -> config). Named <fullname>-<key>.
  # roleRef.name references a key from rbac.roles (auto-prefixed).
  # Subjects default to the chart's ServiceAccount if not specified.
  roleBindings: {}
  # configmap-reader:
  #   roleRef:
  #     name: configmap-reader   # → <fullname>-configmap-reader
  #     kind: Role               # defaults to Role
  #   # subjects: []             # defaults to chart's ServiceAccount

  # -- ClusterRoleBindings to create (map of name -> config). Named <fullname>-<key>.
  # roleRef.name references a key from rbac.clusterRoles (auto-prefixed).
  clusterRoleBindings: {}
  # node-reader:
  #   roleRef:
  #     name: node-reader        # → <fullname>-node-reader
  #     kind: ClusterRole        # defaults to ClusterRole


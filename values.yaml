# -- Hook Jobs (map of name -> config).
# Runs Jobs at Helm lifecycle events (pre-install, pre-upgrade, etc.).
# Hooks share the main workload's pod settings (ServiceAccount, tolerations,
# volumes, security context) but define their own containers.
# Both Helm and Argo CD hook annotations are rendered automatically.
hooks: {}

suite: Replica suppression
tests:
  # ===========================================================================
  # Deployment
  # ===========================================================================

  - it: "Deployment: should include replicas when neither HPA nor KEDA enabled"
    templates:
      - templates/workloads/deployment.yaml
    set:
      workloadType: Deployment
      containers:
        app:
          image:
            repository: nginx
          ports:
            http:
              port: 80
      services:
        main:
          ports:
            http:
              port: 80
    asserts:
      - equal:
          path: spec.replicas
          value: 1

  - it: "Deployment: should suppress replicas when HPA enabled"
    templates:
      - templates/workloads/deployment.yaml
    set:
      workloadType: Deployment
      containers:
        app:
          image:
            repository: nginx
          ports:
            http:
              port: 80
      services:
        main:
          ports:
            http:
              port: 80
      autoscaling:
        hpa:
          enabled: true
    asserts:
      - isNull:
          path: spec.replicas

  - it: "Deployment: should suppress replicas when KEDA enabled"
    templates:
      - templates/workloads/deployment.yaml
    set:
      workloadType: Deployment
      containers:
        app:
          image:
            repository: nginx
          ports:
            http:
              port: 80
      services:
        main:
          ports:
            http:
              port: 80
      autoscaling:
        keda:
          enabled: true
          triggers:
            - type: cron
              metadata:
                timezone: UTC
                start: "0 8 * * *"
                end: "0 18 * * *"
                desiredReplicas: "1"
    asserts:
      - isNull:
          path: spec.replicas


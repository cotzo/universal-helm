suite: Alerting rules (PrometheusRule, VMRule)
templates:
  - templates/monitoring/alerting-rule.yaml
tests:
  - it: should not render when no alerting rules defined
    set:
      containers:
        app:
          image:
            repository: nginx
          ports:
            http:
              port: 80
      networking:
        services:
          http:
            ports:
              http:
                port: 80
    asserts:
      - hasDocuments:
          count: 0

  - it: should render PrometheusRule by default
    set:
      containers:
        app:
          image:
            repository: nginx
          ports:
            http:
              port: 80
      networking:
        services:
          http:
            ports:
              http:
                port: 80
      alerting:
        app-alerts:
          groups:
            - name: high-error-rate
              rules:
                - alert: HighErrorRate
                  expr: rate(http_errors_total[5m]) > 0.1
                  for: 5m
                  labels:
                    severity: critical
                  annotations:
                    summary: High error rate
    asserts:
      - isKind:
          of: PrometheusRule
      - isAPIVersion:
          of: monitoring.coreos.com/v1
      - equal:
          path: spec.groups[0].name
          value: high-error-rate
      - equal:
          path: spec.groups[0].rules[0].alert
          value: HighErrorRate
      - equal:
          path: spec.groups[0].rules[0].for
          value: 5m
      - equal:
          path: spec.groups[0].rules[0].labels.severity
          value: critical

  - it: should render PrometheusRule with explicit operator
    set:
      containers:
        app:
          image:
            repository: nginx
          ports:
            http:
              port: 80
      networking:
        services:
          http:
            ports:
              http:
                port: 80
      alerting:
        slo-alerts:
          operator: prometheus
          groups:
            - name: slo
              interval: 1m
              rules:
                - alert: SLOBreach
                  expr: slo_errors_ratio > 0.01
                  for: 10m
    asserts:
      - isKind:
          of: PrometheusRule
      - isAPIVersion:
          of: monitoring.coreos.com/v1
      - equal:
          path: spec.groups[0].interval
          value: 1m

  - it: should render VMRule for victoriametrics operator
    set:
      containers:
        app:
          image:
            repository: nginx
          ports:
            http:
              port: 80
      networking:
        services:
          http:
            ports:
              http:
                port: 80
      alerting:
        vm-alerts:
          operator: victoriametrics
          groups:
            - name: vm-app-alerts
              concurrency: 2
              rules:
                - alert: HighLatency
                  expr: histogram_quantile(0.99, rate(http_duration_seconds_bucket[5m])) > 1
                  for: 3m
                  labels:
                    severity: warning
    asserts:
      - isKind:
          of: VMRule
      - isAPIVersion:
          of: operator.victoriametrics.com/v1beta1
      - equal:
          path: spec.groups[0].name
          value: vm-app-alerts
      - equal:
          path: spec.groups[0].concurrency
          value: 2

  - it: should render multiple alerting rules
    set:
      containers:
        app:
          image:
            repository: nginx
          ports:
            http:
              port: 80
      networking:
        services:
          http:
            ports:
              http:
                port: 80
      alerting:
        prom-alerts:
          operator: prometheus
          groups:
            - name: prom
              rules:
                - alert: Test
                  expr: up == 0
        vm-alerts:
          operator: victoriametrics
          groups:
            - name: vm
              rules:
                - alert: Test
                  expr: up == 0
    asserts:
      - hasDocuments:
          count: 2

  - it: should render recording rules alongside alerting rules
    set:
      containers:
        app:
          image:
            repository: nginx
          ports:
            http:
              port: 80
      networking:
        services:
          http:
            ports:
              http:
                port: 80
      alerting:
        mixed:
          groups:
            - name: recordings
              rules:
                - record: job:http_requests:rate5m
                  expr: sum(rate(http_requests_total[5m])) by (job)
            - name: alerts
              rules:
                - alert: HighRequests
                  expr: job:http_requests:rate5m > 1000
                  for: 5m
    asserts:
      - isKind:
          of: PrometheusRule
      - equal:
          path: spec.groups[0].rules[0].record
          value: "job:http_requests:rate5m"
      - equal:
          path: spec.groups[1].rules[0].alert
          value: HighRequests

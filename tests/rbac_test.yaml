suite: RBAC rendering (ServiceAccount, Role, RoleBinding, ClusterRole, ClusterRoleBinding)
templates:
  - templates/rbac/serviceaccount.yaml
  - templates/rbac/role.yaml
  - templates/rbac/rolebinding.yaml
  - templates/rbac/clusterrole.yaml
  - templates/rbac/clusterrolebinding.yaml
tests:
  # ---------------------------------------------------------------------------
  # ServiceAccount
  # ---------------------------------------------------------------------------
  - it: should render ServiceAccount when create is true (default)
    template: templates/rbac/serviceaccount.yaml
    set:
      containers:
        app:
          image:
            repository: nginx
          ports:
            http:
              port: 80
      networking:
        services:
          http:
            ports:
              http:
                port: 80
    asserts:
      - isKind:
          of: ServiceAccount
      - hasDocuments:
          count: 1

  - it: should NOT render ServiceAccount when create is false
    template: templates/rbac/serviceaccount.yaml
    set:
      containers:
        app:
          image:
            repository: nginx
          ports:
            http:
              port: 80
      networking:
        services:
          http:
            ports:
              http:
                port: 80
      rbac:
        serviceAccount:
          create: false
    asserts:
      - hasDocuments:
          count: 0

  - it: should render ServiceAccount annotations
    template: templates/rbac/serviceaccount.yaml
    set:
      containers:
        app:
          image:
            repository: nginx
          ports:
            http:
              port: 80
      networking:
        services:
          http:
            ports:
              http:
                port: 80
      rbac:
        serviceAccount:
          create: true
          annotations:
            eks.amazonaws.com/role-arn: arn:aws:iam::123456789:role/my-role
    asserts:
      - equal:
          path: metadata.annotations["eks.amazonaws.com/role-arn"]
          value: arn:aws:iam::123456789:role/my-role

  # ---------------------------------------------------------------------------
  # Role
  # ---------------------------------------------------------------------------
  - it: should render Role with rules
    template: templates/rbac/role.yaml
    set:
      containers:
        app:
          image:
            repository: nginx
          ports:
            http:
              port: 80
      networking:
        services:
          http:
            ports:
              http:
                port: 80
      rbac:
        roles:
          reader:
            rules:
              - apiGroups: [""]
                resources: ["pods"]
                verbs: ["get", "list"]
    asserts:
      - isKind:
          of: Role
      - equal:
          path: metadata.name
          value: RELEASE-NAME-chartpack-reader
      - equal:
          path: rules[0].resources[0]
          value: pods

  # ---------------------------------------------------------------------------
  # ClusterRole
  # ---------------------------------------------------------------------------
  - it: should render ClusterRole with rules
    template: templates/rbac/clusterrole.yaml
    set:
      containers:
        app:
          image:
            repository: nginx
          ports:
            http:
              port: 80
      networking:
        services:
          http:
            ports:
              http:
                port: 80
      rbac:
        clusterRoles:
          nodes-reader:
            rules:
              - apiGroups: [""]
                resources: ["nodes"]
                verbs: ["get", "list"]
    asserts:
      - isKind:
          of: ClusterRole
      - equal:
          path: metadata.name
          value: RELEASE-NAME-chartpack-nodes-reader
      - isNull:
          path: metadata.namespace

  # ---------------------------------------------------------------------------
  # RoleBinding
  # ---------------------------------------------------------------------------
  - it: should render RoleBinding referencing correct Role
    template: templates/rbac/rolebinding.yaml
    set:
      containers:
        app:
          image:
            repository: nginx
          ports:
            http:
              port: 80
      networking:
        services:
          http:
            ports:
              http:
                port: 80
      rbac:
        roleBindings:
          reader-binding:
            roleRef:
              name: reader
    asserts:
      - isKind:
          of: RoleBinding
      - equal:
          path: roleRef.name
          value: RELEASE-NAME-chartpack-reader
      - equal:
          path: roleRef.kind
          value: Role

  # ---------------------------------------------------------------------------
  # ClusterRoleBinding
  # ---------------------------------------------------------------------------
  - it: should render ClusterRoleBinding referencing correct ClusterRole
    template: templates/rbac/clusterrolebinding.yaml
    set:
      containers:
        app:
          image:
            repository: nginx
          ports:
            http:
              port: 80
      networking:
        services:
          http:
            ports:
              http:
                port: 80
      rbac:
        clusterRoleBindings:
          nodes-binding:
            roleRef:
              name: nodes-reader
    asserts:
      - isKind:
          of: ClusterRoleBinding
      - equal:
          path: roleRef.name
          value: RELEASE-NAME-chartpack-nodes-reader
      - equal:
          path: roleRef.kind
          value: ClusterRole
      - isNull:
          path: metadata.namespace

  # ---------------------------------------------------------------------------
  # Not rendered when no rbac defined
  # ---------------------------------------------------------------------------
  - it: should not render Role when no rbac roles defined
    template: templates/rbac/role.yaml
    set:
      containers:
        app:
          image:
            repository: nginx
          ports:
            http:
              port: 80
      networking:
        services:
          http:
            ports:
              http:
                port: 80
    asserts:
      - hasDocuments:
          count: 0

  - it: should not render ClusterRoleBinding when no rbac clusterRoleBindings defined
    template: templates/rbac/clusterrolebinding.yaml
    set:
      containers:
        app:
          image:
            repository: nginx
          ports:
            http:
              port: 80
      networking:
        services:
          http:
            ports:
              http:
                port: 80
    asserts:
      - hasDocuments:
          count: 0

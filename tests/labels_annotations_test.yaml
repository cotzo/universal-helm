suite: Labels and annotations
templates:
  - templates/workloads/deployment.yaml
set:
  containers:
    app:
      image:
        repository: nginx
      ports:
        http:
          port: 80
  networking:
    services:
      http:
        ports:
          http:
            port: 80
tests:
  - it: should render standard labels
    asserts:
      - matchRegex:
          path: metadata.labels["helm.sh/chart"]
          pattern: ^chartpack-\d+\.\d+\.\d+$
      - equal:
          path: metadata.labels["app.kubernetes.io/name"]
          value: chartpack
      - equal:
          path: metadata.labels["app.kubernetes.io/instance"]
          value: RELEASE-NAME
      - equal:
          path: metadata.labels["app.kubernetes.io/managed-by"]
          value: Helm
      - equal:
          path: metadata.labels["app.kubernetes.io/version"]
          value: "1.0.0"

  - it: should render global labels on resource metadata
    set:
      global:
        labels:
          team: platform
          environment: staging
    asserts:
      - equal:
          path: metadata.labels.team
          value: platform
      - equal:
          path: metadata.labels.environment
          value: staging

  - it: should render global annotations on resource metadata
    set:
      global:
        annotations:
          example.com/owner: myteam
          example.com/tier: backend
    asserts:
      - equal:
          path: metadata.annotations["example.com/owner"]
          value: myteam
      - equal:
          path: metadata.annotations["example.com/tier"]
          value: backend

  - it: should render selectorLabels on matchLabels
    asserts:
      - equal:
          path: spec.selector.matchLabels["app.kubernetes.io/name"]
          value: chartpack
      - equal:
          path: spec.selector.matchLabels["app.kubernetes.io/instance"]
          value: RELEASE-NAME

  - it: should render pod template labels including selectorLabels
    asserts:
      - equal:
          path: spec.template.metadata.labels["app.kubernetes.io/name"]
          value: chartpack
      - equal:
          path: spec.template.metadata.labels["app.kubernetes.io/instance"]
          value: RELEASE-NAME

  - it: should add reloader configmap annotation when configMaps exist
    set:
      config:
        configMaps:
          app-config:
            data:
              key: value
    asserts:
      - matchRegex:
          path: metadata.annotations["configmap.reloader.stakater.com/reload"]
          pattern: ".*app-config.*"

  - it: should add reloader secret annotation when secrets exist
    set:
      config:
        secrets:
          app-creds:
            stringData:
              key: value
    asserts:
      - matchRegex:
          path: metadata.annotations["secret.reloader.stakater.com/reload"]
          pattern: ".*app-creds.*"

  - it: should exclude configMap from reloader when reloaderEnabled is false
    set:
      config:
        configMaps:
          watched:
            data:
              key: value
          excluded:
            reloaderEnabled: false
            data:
              key: value
    asserts:
      - matchRegex:
          path: metadata.annotations["configmap.reloader.stakater.com/reload"]
          pattern: ".*watched.*"
      - notMatchRegex:
          path: metadata.annotations["configmap.reloader.stakater.com/reload"]
          pattern: ".*excluded.*"

  - it: should not add reloader annotations when no configMaps or secrets
    asserts:
      - notExists:
          path: metadata.annotations["configmap.reloader.stakater.com/reload"]
      - notExists:
          path: metadata.annotations["secret.reloader.stakater.com/reload"]

suite: Workload-specific options
tests:
  # ── Deployment ──────────────────────────────────────────────────────
  - it: should render Deployment strategy
    templates:
      - templates/workloads/deployment.yaml
    set:
      containers:
        app:
          image:
            repository: nginx
          ports:
            http:
              port: 80
      networking:
        services:
          http:
            ports:
              http:
                port: 80
      workloads:
        deployment:
          strategy:
            type: RollingUpdate
    asserts:
      - equal:
          path: spec.strategy.type
          value: RollingUpdate

  - it: should render Deployment revisionHistoryLimit
    templates:
      - templates/workloads/deployment.yaml
    set:
      containers:
        app:
          image:
            repository: nginx
          ports:
            http:
              port: 80
      networking:
        services:
          http:
            ports:
              http:
                port: 80
      workloads:
        deployment:
          revisionHistoryLimit: 5
    asserts:
      - equal:
          path: spec.revisionHistoryLimit
          value: 5

  - it: should render Deployment minReadySeconds
    templates:
      - templates/workloads/deployment.yaml
    set:
      containers:
        app:
          image:
            repository: nginx
          ports:
            http:
              port: 80
      networking:
        services:
          http:
            ports:
              http:
                port: 80
      workloads:
        deployment:
          minReadySeconds: 30
    asserts:
      - equal:
          path: spec.minReadySeconds
          value: 30

  # ── StatefulSet ─────────────────────────────────────────────────────
  - it: should render StatefulSet podManagementPolicy
    templates:
      - templates/workloads/statefulset.yaml
    set:
      workloadType: StatefulSet
      containers:
        app:
          image:
            repository: nginx
          ports:
            http:
              port: 80
      networking:
        services:
          http:
            ports:
              http:
                port: 80
      workloads:
        statefulSet:
          podManagementPolicy: Parallel
    asserts:
      - equal:
          path: spec.podManagementPolicy
          value: Parallel

  - it: should render StatefulSet updateStrategy
    templates:
      - templates/workloads/statefulset.yaml
    set:
      workloadType: StatefulSet
      containers:
        app:
          image:
            repository: nginx
          ports:
            http:
              port: 80
      networking:
        services:
          http:
            ports:
              http:
                port: 80
      workloads:
        statefulSet:
          updateStrategy:
            type: RollingUpdate
    asserts:
      - equal:
          path: spec.updateStrategy.type
          value: RollingUpdate

  # ── DaemonSet ───────────────────────────────────────────────────────
  - it: should render DaemonSet updateStrategy
    templates:
      - templates/workloads/daemonset.yaml
    set:
      workloadType: DaemonSet
      containers:
        app:
          image:
            repository: nginx
          ports:
            http:
              port: 80
      networking:
        services:
          http:
            ports:
              http:
                port: 80
      workloads:
        daemonSet:
          updateStrategy:
            type: OnDelete
    asserts:
      - equal:
          path: spec.updateStrategy.type
          value: OnDelete

  # ── CronJob ────────────────────────────────────────────────────────
  - it: should render CronJob schedule
    templates:
      - templates/workloads/cronjob.yaml
    set:
      workloadType: CronJob
      containers:
        app:
          image:
            repository: nginx
          ports:
            http:
              port: 80
      networking:
        services:
          http:
            ports:
              http:
                port: 80
      workloads:
        cronJob:
          schedule: "*/5 * * * *"
    asserts:
      - equal:
          path: spec.schedule
          value: "*/5 * * * *"

  - it: should render CronJob concurrencyPolicy
    templates:
      - templates/workloads/cronjob.yaml
    set:
      workloadType: CronJob
      containers:
        app:
          image:
            repository: nginx
          ports:
            http:
              port: 80
      networking:
        services:
          http:
            ports:
              http:
                port: 80
      workloads:
        cronJob:
          schedule: "*/5 * * * *"
          concurrencyPolicy: Forbid
    asserts:
      - equal:
          path: spec.concurrencyPolicy
          value: Forbid

  - it: should render CronJob timeZone
    templates:
      - templates/workloads/cronjob.yaml
    set:
      workloadType: CronJob
      containers:
        app:
          image:
            repository: nginx
          ports:
            http:
              port: 80
      networking:
        services:
          http:
            ports:
              http:
                port: 80
      workloads:
        cronJob:
          schedule: "0 0 * * *"
          timeZone: "America/New_York"
    asserts:
      - equal:
          path: spec.timeZone
          value: "America/New_York"

  # ── Job ─────────────────────────────────────────────────────────────
  - it: should render Job backoffLimit
    templates:
      - templates/workloads/job.yaml
    set:
      workloadType: Job
      containers:
        app:
          image:
            repository: nginx
          ports:
            http:
              port: 80
      networking:
        services:
          http:
            ports:
              http:
                port: 80
      workloads:
        job:
          backoffLimit: 3
    asserts:
      - equal:
          path: spec.backoffLimit
          value: 3

  - it: should render Job ttlSecondsAfterFinished
    templates:
      - templates/workloads/job.yaml
    set:
      workloadType: Job
      containers:
        app:
          image:
            repository: nginx
          ports:
            http:
              port: 80
      networking:
        services:
          http:
            ports:
              http:
                port: 80
      workloads:
        job:
          ttlSecondsAfterFinished: 600
    asserts:
      - equal:
          path: spec.ttlSecondsAfterFinished
          value: 600

  - it: should render Job completionMode
    templates:
      - templates/workloads/job.yaml
    set:
      workloadType: Job
      containers:
        app:
          image:
            repository: nginx
          ports:
            http:
              port: 80
      networking:
        services:
          http:
            ports:
              http:
                port: 80
      workloads:
        job:
          completionMode: Indexed
    asserts:
      - equal:
          path: spec.completionMode
          value: Indexed

  # ── Rollout ─────────────────────────────────────────────────────────
  - it: should render Rollout strategy canary
    templates:
      - templates/workloads/rollout.yaml
    set:
      workloadType: Rollout
      containers:
        app:
          image:
            repository: nginx
          ports:
            http:
              port: 80
      networking:
        services:
          http:
            ports:
              http:
                port: 80
      workloads:
        rollout:
          strategy:
            canary:
              steps:
                - setWeight: 20
                - pause:
                    duration: 60s
    asserts:
      - equal:
          path: spec.strategy.canary.steps[0].setWeight
          value: 20

  - it: should render Rollout restartAt
    templates:
      - templates/workloads/rollout.yaml
    set:
      workloadType: Rollout
      containers:
        app:
          image:
            repository: nginx
          ports:
            http:
              port: 80
      networking:
        services:
          http:
            ports:
              http:
                port: 80
      workloads:
        rollout:
          restartAt: "2024-06-01T00:00:00Z"
    asserts:
      - isNotNull:
          path: spec.restartAt

  - it: should render Rollout analysis
    templates:
      - templates/workloads/rollout.yaml
    set:
      workloadType: Rollout
      containers:
        app:
          image:
            repository: nginx
          ports:
            http:
              port: 80
      networking:
        services:
          http:
            ports:
              http:
                port: 80
      workloads:
        rollout:
          analysis:
            successfulRunHistoryLimit: 3
            unsuccessfulRunHistoryLimit: 1
    asserts:
      - equal:
          path: spec.analysis.successfulRunHistoryLimit
          value: 3
      - equal:
          path: spec.analysis.unsuccessfulRunHistoryLimit
          value: 1

  # ── Default values ───────────────────────────────────────────────────
  - it: should use default schedule for CronJob when not set
    templates:
      - templates/workloads/cronjob.yaml
    set:
      workloadType: CronJob
      containers:
        app:
          image:
            repository: nginx
    asserts:
      - equal:
          path: spec.schedule
          value: "0 * * * *"

  - it: should use default replicaCount for Deployment when not set
    templates:
      - templates/workloads/deployment.yaml
    set:
      containers:
        app:
          image:
            repository: nginx
          ports:
            http:
              port: 80
      networking:
        services:
          http:
            ports:
              http:
                port: 80
    asserts:
      - equal:
          path: spec.replicas
          value: 1

  - it: should use default replicaCount for StatefulSet when not set
    templates:
      - templates/workloads/statefulset.yaml
    set:
      workloadType: StatefulSet
      containers:
        app:
          image:
            repository: nginx
          ports:
            http:
              port: 80
      networking:
        services:
          http:
            ports:
              http:
                port: 80
    asserts:
      - equal:
          path: spec.replicas
          value: 1

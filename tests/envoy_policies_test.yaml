suite: Envoy policies
templates:
  - templates/networking/envoy-policies.yaml
set:
  containers:
    app:
      image:
        repository: nginx
      ports:
        http:
          port: 80
  services:
    http:
      ports:
        http:
          port: 80
tests:
  - it: should not render when no envoy policies defined
    asserts:
      - hasDocuments:
          count: 0

  - it: should not render when route has no policies
    set:
      gatewayApi:
        routes:
          web:
            kind: HTTPRoute
            parentRefs:
              - name: my-gateway
                namespace: gateway-ns
            rules:
              - backendRefs:
                  - name: http
                    port: 80
    asserts:
      - hasDocuments:
          count: 0

  - it: should render BackendTrafficPolicy when route has envoy policies
    set:
      gatewayApi:
        routes:
          web:
            kind: HTTPRoute
            parentRefs:
              - name: my-gateway
                namespace: gateway-ns
            rules:
              - backendRefs:
                  - name: http
                    port: 80
            policies:
              envoy:
                loadBalancer:
                  type: RoundRobin
                retry:
                  numRetries: 3
    asserts:
      - isAPIVersion:
          of: gateway.envoyproxy.io/v1alpha1
      - isKind:
          of: BackendTrafficPolicy
      - equal:
          path: spec.loadBalancer.type
          value: RoundRobin
      - equal:
          path: spec.retry.numRetries
          value: 3

  - it: should set targetRef to correct route
    set:
      gatewayApi:
        routes:
          web:
            kind: HTTPRoute
            parentRefs:
              - name: my-gateway
                namespace: gateway-ns
            rules:
              - backendRefs:
                  - name: http
                    port: 80
            policies:
              envoy:
                loadBalancer:
                  type: RoundRobin
    asserts:
      - equal:
          path: spec.targetRefs[0].group
          value: gateway.networking.k8s.io
      - equal:
          path: spec.targetRefs[0].kind
          value: HTTPRoute
      - equal:
          path: spec.targetRefs[0].name
          value: RELEASE-NAME-chartpack-web

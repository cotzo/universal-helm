suite: Grafana dashboards
templates:
  - templates/monitoring/grafana-dashboard.yaml
tests:
  - it: should not render when Grafana integration is disabled
    set:
      containers:
        app:
          image:
            repository: nginx
          ports:
            http:
              port: 80
      networking:
        services:
          http:
            ports:
              http:
                port: 80
      dashboards:
        grafana:
          app-overview:
            instances: [primary]
            source:
              type: json
              json: '{"title": "Test"}'
    asserts:
      - hasDocuments:
          count: 0

  - it: should not render when no dashboards defined
    set:
      containers:
        app:
          image:
            repository: nginx
          ports:
            http:
              port: 80
      networking:
        services:
          http:
            ports:
              http:
                port: 80
      integrations:
        grafana:
          enabled: true
          instances:
            primary:
              matchLabels:
                dashboards: grafana
    asserts:
      - hasDocuments:
          count: 0

  - it: should render GrafanaDashboard with inline JSON source
    set:
      containers:
        app:
          image:
            repository: nginx
          ports:
            http:
              port: 80
      networking:
        services:
          http:
            ports:
              http:
                port: 80
      integrations:
        grafana:
          enabled: true
          instances:
            primary:
              matchLabels:
                dashboards: grafana
      dashboards:
        grafana:
          app-overview:
            instances: [primary]
            source:
              type: json
              json: '{"title": "App Overview", "panels": []}'
            destination:
              folder: My App
    asserts:
      - isKind:
          of: GrafanaDashboard
      - isAPIVersion:
          of: grafana.integreatly.org/v1beta1
      - equal:
          path: spec.instanceSelector.matchLabels.dashboards
          value: grafana
      - equal:
          path: spec.folder
          value: My App
      - equal:
          path: spec.json
          value: '{"title": "App Overview", "panels": []}'

  - it: should render GrafanaDashboard with grafana.com source
    set:
      containers:
        app:
          image:
            repository: nginx
          ports:
            http:
              port: 80
      networking:
        services:
          http:
            ports:
              http:
                port: 80
      integrations:
        grafana:
          enabled: true
          instances:
            primary:
              matchLabels:
                dashboards: grafana
      dashboards:
        grafana:
          node-exporter:
            instances: [primary]
            source:
              type: grafanaCom
              grafanaCom:
                id: 1860
                revision: 37
    asserts:
      - isKind:
          of: GrafanaDashboard
      - equal:
          path: spec.grafanaCom.id
          value: 1860
      - equal:
          path: spec.grafanaCom.revision
          value: 37

  - it: should render GrafanaDashboard with URL source
    set:
      containers:
        app:
          image:
            repository: nginx
          ports:
            http:
              port: 80
      networking:
        services:
          http:
            ports:
              http:
                port: 80
      integrations:
        grafana:
          enabled: true
          instances:
            primary:
              matchLabels:
                dashboards: grafana
      dashboards:
        grafana:
          from-url:
            instances: [primary]
            source:
              type: url
              url: https://example.com/dashboard.json
              contentCacheDuration: 1h
    asserts:
      - isKind:
          of: GrafanaDashboard
      - equal:
          path: spec.url
          value: https://example.com/dashboard.json
      - equal:
          path: spec.contentCacheDuration
          value: 1h

  - it: should render GrafanaDashboard with configMap source
    set:
      containers:
        app:
          image:
            repository: nginx
          ports:
            http:
              port: 80
      networking:
        services:
          http:
            ports:
              http:
                port: 80
      integrations:
        grafana:
          enabled: true
          instances:
            primary:
              matchLabels:
                dashboards: grafana
      dashboards:
        grafana:
          from-cm:
            instances: [primary]
            source:
              type: configMap
              configMap: my-dashboards
              key: app.json
    asserts:
      - isKind:
          of: GrafanaDashboard
      - equal:
          path: spec.configMapRef.name
          value: RELEASE-NAME-chartpack-my-dashboards
      - equal:
          path: spec.configMapRef.key
          value: app.json

  - it: should render multiple dashboards
    set:
      containers:
        app:
          image:
            repository: nginx
          ports:
            http:
              port: 80
      networking:
        services:
          http:
            ports:
              http:
                port: 80
      integrations:
        grafana:
          enabled: true
          instances:
            primary:
              matchLabels:
                dashboards: grafana
      dashboards:
        grafana:
          first:
            instances: [primary]
            source:
              type: json
              json: '{"title": "First"}'
          second:
            instances: [primary]
            source:
              type: json
              json: '{"title": "Second"}'
    asserts:
      - hasDocuments:
          count: 2

  - it: should render one dashboard per instance for multi-instance
    set:
      containers:
        app:
          image:
            repository: nginx
          ports:
            http:
              port: 80
      networking:
        services:
          http:
            ports:
              http:
                port: 80
      integrations:
        grafana:
          enabled: true
          instances:
            primary:
              matchLabels:
                dashboards: grafana
            staging:
              matchLabels:
                dashboards: grafana-staging
      dashboards:
        grafana:
          app-overview:
            instances: [primary, staging]
            source:
              type: json
              json: '{"title": "App Overview"}'
    asserts:
      - hasDocuments:
          count: 2

  - it: should set destination fields and datasources
    set:
      containers:
        app:
          image:
            repository: nginx
          ports:
            http:
              port: 80
      networking:
        services:
          http:
            ports:
              http:
                port: 80
      integrations:
        grafana:
          enabled: true
          instances:
            primary:
              matchLabels:
                dashboards: grafana
      dashboards:
        grafana:
          with-datasource:
            instances: [primary]
            source:
              type: json
              json: '{"title": "Test"}'
            destination:
              folderUID: abc123
            datasources:
              - inputName: DS_PROMETHEUS
                datasourceName: Prometheus
    asserts:
      - equal:
          path: spec.folderUID
          value: abc123
      - contains:
          path: spec.datasources
          content:
            inputName: DS_PROMETHEUS
            datasourceName: Prometheus

<line x1="512" y1="410" x2="698.5" y2="349.4" stroke="url(#gradMain)" stroke-width="18.55" stroke-linecap="round" opacity="0.9"/>
<line x1="512" y1="410" x2="627.3" y2="568.6" stroke="url(#gradMain)" stroke-width="18.55" stroke-linecap="round" opacity="0.9"/>
<line x1="512" y1="410" x2="396.7" y2="568.6" stroke="url(#gradMain)" stroke-width="18.55" stroke-linecap="round" opacity="0.9"/>
<line x1="512" y1="410" x2="325.5" y2="349.4" stroke="url(#gradMain)" stroke-width="18.55" stroke-linecap="round" opacity="0.9"/>

workloadType: Rollout

containers:
  app:
    image:
      repository: my-app
      tag: "1.0.0"
    ports:
      http:
        port: 8080
    resources:
      requests:
        cpu: 100m
        memory: 128Mi
      limits:
        cpu: 500m
        memory: 256Mi
    healthChecks:
      liveness:
        httpGet:
          path: /healthz
          port: http
        initialDelaySeconds: 10
        periodSeconds: 10
      readiness:
        httpGet:
          path: /ready
          port: http
        initialDelaySeconds: 5
        periodSeconds: 5

services:
  stable:
    type: ClusterIP
    ports:
      http:
        port: 80
        containerPort: http
  canary:
    type: ClusterIP
    ports:
      http:
        port: 80
        containerPort: http

rollout:
  replicaCount: 3
  strategy:
    canary:
      canaryService: RELEASE-NAME-canary
      stableService: RELEASE-NAME-stable
      steps:
        - setWeight: 20
        - pause: { duration: 30s }
        - setWeight: 50
        - pause: { duration: 30s }
        - setWeight: 80
        - pause: { duration: 30s }

autoscaling:
  hpa:
    enabled: true
    minReplicas: 3
    maxReplicas: 10
    metrics:
      - type: Resource
        resource:
          name: cpu
          target:
            type: Utilization
            averageUtilization: 80

pdb:
  enabled: true
  minAvailable: 1

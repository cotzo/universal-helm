workloadType: Deployment

containers:
  app:
    image:
      repository: my-app
      tag: "1.0.0"
    ports:
      http:
        port: 8080
    env:
      - name: APP_ENV
        value: "production"
      - name: LOG_LEVEL
        value: "info"
    resources:
      requests:
        cpu: 100m
        memory: 128Mi
      limits:
        cpu: 500m
        memory: 256Mi
    livenessProbe:
      httpGet:
        path: /healthz
        port: http
      initialDelaySeconds: 10
      periodSeconds: 10
    readinessProbe:
      httpGet:
        path: /ready
        port: http
      initialDelaySeconds: 5
      periodSeconds: 5
    mounts:
      - path: /etc/config
        configMap: app-config
        readOnly: true

services:
  http:
    type: ClusterIP
    ports:
      http:
        port: 80
        containerPort: http

ingresses:
  public:
    className: nginx
    annotations:
      cert-manager.io/cluster-issuer: letsencrypt-prod
    hosts:
      - host: app.example.com
        paths:
          - path: /
            pathType: Prefix
    tls:
      - secretName: app-tls
        hosts:
          - app.example.com

configMaps:
  app-config:
    data:
      config.yaml: |
        server:
          port: 8080
        logging:
          level: info

deployment:
  replicaCount: 3

autoscaling:
  enabled: true
  minReplicas: 3
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 80

pdb:
  enabled: true
  minAvailable: 1

monitors:
  metrics:
    kind: service
    operator: prometheus
    port: http
    path: /metrics
    interval: 30s

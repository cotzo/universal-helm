workloadType: Deployment
containers:
  app:
    image:
      repository: nginx
      tag: "1.27"
    ports:
      http:
        port: 80
    healthChecks:
      readiness:
        httpGet:
          path: /
          port: http
        initialDelaySeconds: 2
        periodSeconds: 5
    mounts:
      - path: /etc/nginx/conf.d
        configMap: nginx-config
        readOnly: true
services:
  http:
    type: ClusterIP
    ports:
      http:
        port: 80
        containerPort: http
config:
  configMaps:
    nginx-config:
      data:
        default.conf: |
          server { listen 80; location / { return 200 'ok\n'; add_header Content-Type text/plain; } }
deployment:
  replicaCount: 2
autoscaling:
  hpa:
    enabled: true
    minReplicas: 2
    maxReplicas: 5
    metrics:
      - type: Resource
        resource:
          name: cpu
          target:
            type: Utilization
            averageUtilization: 80
pdb:
  enabled: true
  minAvailable: 1
rbac:
  serviceAccount:
    create: true
  roles:
    reader:
      rules:
        - apiGroups: [""]
          resources: ["configmaps"]
          verbs: ["get", "list"]
  roleBindings:
    reader:
      roleRef:
        name: reader

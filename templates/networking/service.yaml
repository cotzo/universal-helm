{{- if not (or (eq .Values.workloadType "CronJob") (eq .Values.workloadType "Job")) }}

{{- /* Auto-generate headless service for StatefulSets */ -}}
{{- if eq .Values.workloadType "StatefulSet" }}
{{- /* Collect all ports from all enabled services for the headless service */ -}}
{{- $hasHeadlessPorts := false }}
{{- range $name, $svc := .Values.networking.services }}
{{- if $svc.ports }}
{{- $hasHeadlessPorts = true }}
{{- end }}
{{- end }}
{{- if $hasHeadlessPorts }}
---
apiVersion: v1
kind: Service
{{ include "chartpack.metadata" (dict "name" (include "chartpack.networking.headlessServiceName" .) "context" $ "syncWaveDefault" "1") }}
spec:
  type: ClusterIP
  clusterIP: None
  {{- if .Values.workloads.statefulSet.publishNotReadyAddresses }}
  publishNotReadyAddresses: true
  {{- end }}
  ports:
    {{- $seenPorts := dict }}
    {{- range $svcName, $svc := .Values.networking.services }}
    {{- if $svc }}
    {{- range $portName, $portCfg := $svc.ports }}
    {{- if not (hasKey $seenPorts $portName) }}
    {{- $_ := set $seenPorts $portName true }}
    - name: {{ $portName }}
      port: {{ $portCfg.port }}
      targetPort: {{ default $portName $portCfg.containerPort }}
      protocol: {{ default "TCP" $portCfg.protocol }}
    {{- end }}
    {{- end }}
    {{- end }}
    {{- end }}
  selector:
    {{- include "chartpack.selectorLabels" . | nindent 4 }}
{{- end }}
{{- end }}

{{- /* User-defined services */ -}}
{{- range $name, $svc := .Values.networking.services }}
{{- if $svc }}
---
apiVersion: v1
kind: Service
{{ include "chartpack.metadata" (dict "name" (printf "%s-%s" (include "chartpack.fullname" $) $name) "context" $ "extraAnnotations" $svc.annotations "extraLabels" $svc.labels "syncWaveDefault" "1" "syncWave" $svc.syncWave) }}
spec:
  {{- if $svc.headless }}
  type: ClusterIP
  clusterIP: None
  {{- else }}
  type: {{ default "ClusterIP" $svc.type }}
  {{- if and (eq (default "ClusterIP" $svc.type) "ClusterIP") $svc.clusterIP }}
  clusterIP: {{ $svc.clusterIP }}
  {{- end }}
  {{- end }}
  {{- if and (eq (default "ClusterIP" $svc.type) "LoadBalancer") $svc.loadBalancerIP }}
  loadBalancerIP: {{ $svc.loadBalancerIP }}
  {{- end }}
  {{- if and (eq (default "ClusterIP" $svc.type) "LoadBalancer") $svc.loadBalancerSourceRanges }}
  loadBalancerSourceRanges:
    {{- toYaml $svc.loadBalancerSourceRanges | nindent 4 }}
  {{- end }}
  {{- with $svc.externalTrafficPolicy }}
  externalTrafficPolicy: {{ . }}
  {{- end }}
  {{- with $svc.trafficDistribution }}
  trafficDistribution: {{ . }}
  {{- end }}
  {{- with $svc.sessionAffinity }}
  sessionAffinity: {{ . }}
  {{- end }}
  {{- with $svc.ipFamilyPolicy }}
  ipFamilyPolicy: {{ . }}
  {{- end }}
  {{- with $svc.ipFamilies }}
  ipFamilies:
    {{- toYaml . | nindent 4 }}
  {{- end }}
  {{- if $svc.publishNotReadyAddresses }}
  publishNotReadyAddresses: true
  {{- end }}
  ports:
    {{- range $portName, $portCfg := $svc.ports }}
    - name: {{ $portName }}
      port: {{ $portCfg.port }}
      targetPort: {{ default $portName $portCfg.containerPort }}
      protocol: {{ default "TCP" $portCfg.protocol }}
      {{- if and (or (eq (default "ClusterIP" $svc.type) "NodePort") (eq (default "ClusterIP" $svc.type) "LoadBalancer")) $portCfg.nodePort }}
      nodePort: {{ $portCfg.nodePort }}
      {{- end }}
    {{- end }}
    {{- /* Auto-inject oauth2 proxy sidecar ports */ -}}
    {{- range $proxyName, $proxyCfg := $.Values.networking.oauth2Proxies }}
    {{- if and $proxyCfg (eq (default "sidecar" $proxyCfg.mode) "sidecar") }}
    {{- if include "chartpack.networking.oauth2Proxy.needed" (dict "key" $proxyName "context" $) }}
    - name: oauth2-{{ $proxyName }}
      port: {{ default 4180 $proxyCfg.port }}
      targetPort: oauth2-{{ default "proxy" $proxyCfg.portName }}
      protocol: TCP
    {{- end }}
    {{- end }}
    {{- end }}
  selector:
    {{- include "chartpack.selectorLabels" $ | nindent 4 }}
    {{- with $svc.selectorLabels }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
{{- end }}
{{- end }}

{{- end }}

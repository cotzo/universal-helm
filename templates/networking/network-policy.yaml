{{- $fullName := include "chartpack.fullname" . -}}
{{- range $name, $np := .Values.networking.networkPolicies }}
{{- if $np }}
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
{{ include "chartpack.metadata" (dict "name" (printf "%s-%s" $fullName $name) "context" $ "extraAnnotations" $np.annotations "extraLabels" $np.labels) }}
spec:
  {{- if $np.podSelector }}
  podSelector:
    {{- toYaml $np.podSelector | nindent 4 }}
  {{- else }}
  podSelector:
    matchLabels:
      {{- include "chartpack.selectorLabels" $ | nindent 6 }}
  {{- end }}
  {{- with $np.policyTypes }}
  policyTypes:
    {{- toYaml . | nindent 4 }}
  {{- end }}
  {{- with $np.ingress }}
  ingress:
    {{- toYaml . | nindent 4 }}
  {{- end }}
  {{- with $np.egress }}
  egress:
    {{- toYaml . | nindent 4 }}
  {{- end }}
{{- end }}
{{- end }}

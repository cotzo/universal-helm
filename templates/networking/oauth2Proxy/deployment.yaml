{{- $fullName := include "chartpack.fullname" . -}}
{{- range $name, $proxy := .Values.oauth2Proxies }}
{{- if $proxy }}
{{- if and (eq (default "sidecar" $proxy.mode) "deployment") (include "chartpack.networking.oauth2Proxy.needed" (dict "key" $name "context" $)) }}
{{- $proxyServiceName := include "chartpack.networking.oauth2Proxy.serviceName" (dict "key" $name "context" $) }}
{{- $port := default 4180 $proxy.port }}

{{- /* Resolve upstream: explicit or auto-derived from ingress/route default backend */ -}}
{{- $upstream := $proxy.upstream -}}
{{- if not $upstream -}}
{{- /* Check ingresses that reference this proxy — derive from default service */ -}}
{{- range $ingName, $ing := $.Values.ingresses -}}
{{- if and $ing (eq (default "" $ing.oauth2Proxy) $name) (not $upstream) -}}
{{- range $svcName, $svc := $.Values.services -}}
{{- if and $svc (not $upstream) (not $svc.headless) -}}
{{- range $pName, $pCfg := $svc.ports -}}
{{- if not $upstream -}}
{{- $upstream = printf "http://%s-%s:%s" $fullName $svcName (toString $pCfg.port) -}}
{{- end -}}
{{- end -}}
{{- end -}}
{{- end -}}
{{- end -}}
{{- end -}}
{{- /* Check routes that reference this proxy — derive from first backendRef */ -}}
{{- range $routeName, $route := $.Values.gatewayApi.routes -}}
{{- if and $route (eq (default "" $route.oauth2Proxy) $name) (not $upstream) -}}
{{- range $route.rules -}}
{{- range .backendRefs -}}
{{- if not $upstream -}}
{{- $upstream = printf "http://%s-%s:%s" $fullName .name (toString .port) -}}
{{- end -}}
{{- end -}}
{{- end -}}
{{- end -}}
{{- end -}}
{{- end }}
---
apiVersion: apps/v1
kind: Deployment
{{ include "chartpack.metadata" (dict "name" $proxyServiceName "context" $ "extraAnnotations" $proxy.annotations "extraLabels" $proxy.labels) }}
spec:
  replicas: {{ default 1 $proxy.replicas }}
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ $proxyServiceName }}
      app.kubernetes.io/instance: {{ $.Release.Name }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ $proxyServiceName }}
        app.kubernetes.io/instance: {{ $.Release.Name }}
    spec:
      {{- with $.Values.podSettings.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: oauth2-proxy
          {{- include "chartpack.networking.oauth2Proxy.containerSpec" (dict "proxy" $proxy "upstream" $upstream "port" $port "fullName" $fullName) | nindent 10 }}
---
apiVersion: v1
kind: Service
{{ include "chartpack.metadata" (dict "name" $proxyServiceName "context" $ "extraAnnotations" $proxy.annotations "extraLabels" $proxy.labels) }}
spec:
  type: ClusterIP
  ports:
    - name: http
      port: {{ $port }}
      targetPort: http
      protocol: TCP
  selector:
    app.kubernetes.io/name: {{ $proxyServiceName }}
    app.kubernetes.io/instance: {{ $.Release.Name }}

{{- end }}
{{- end }}
{{- end }}

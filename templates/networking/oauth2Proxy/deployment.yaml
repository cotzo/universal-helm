{{- $fullName := include "chartpack.fullname" . -}}
{{- range $name, $proxy := .Values.oauth2Proxies }}
{{- if $proxy }}
{{- if and (eq (default "sidecar" $proxy.mode) "deployment") (include "chartpack.networking.oauth2Proxy.needed" (dict "key" $name "context" $)) }}
{{- $proxyServiceName := include "chartpack.networking.oauth2Proxy.serviceName" (dict "key" $name "context" $) }}
{{- $port := default 4180 $proxy.port }}

{{- /* Deployment mode requires explicit upstream */ -}}
{{- $upstream := $proxy.upstream -}}
{{- if not $upstream -}}
{{- fail (printf "oauth2Proxies.%s: upstream is required when mode is deployment (e.g., upstream: http://<fullname>-<service>:<port>)" $name) -}}
{{- end }}
---
apiVersion: apps/v1
kind: Deployment
{{ include "chartpack.metadata" (dict "name" $proxyServiceName "context" $ "extraAnnotations" $proxy.annotations "extraLabels" $proxy.labels) }}
spec:
  replicas: {{ default 1 $proxy.replicas }}
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ $proxyServiceName }}
      app.kubernetes.io/instance: {{ $.Release.Name }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ $proxyServiceName }}
        app.kubernetes.io/instance: {{ $.Release.Name }}
    spec:
      {{- with $.Values.podSettings.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: oauth2-proxy
          {{- include "chartpack.networking.oauth2Proxy.containerSpec" (dict "proxy" $proxy "upstream" $upstream "port" $port "fullName" $fullName) | nindent 10 }}
---
apiVersion: v1
kind: Service
{{ include "chartpack.metadata" (dict "name" $proxyServiceName "context" $ "extraAnnotations" $proxy.annotations "extraLabels" $proxy.labels) }}
spec:
  type: ClusterIP
  ports:
    - name: http
      port: {{ $port }}
      targetPort: http
      protocol: TCP
  selector:
    app.kubernetes.io/name: {{ $proxyServiceName }}
    app.kubernetes.io/instance: {{ $.Release.Name }}

{{- end }}
{{- end }}
{{- end }}

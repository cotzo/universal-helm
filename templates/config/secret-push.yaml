{{- if (dig "eso" "enabled" false (default (dict) .Values.integrations)) -}}
{{- $fullName := include "chartpack.fullname" . -}}
{{- $stores := default (dict) (dig "eso" "stores" (dict) .Values.integrations) -}}
{{- range $name, $config := .Values.config.secrets }}
{{- if and $config $config.push (not $config.existing) }}
---
apiVersion: external-secrets.io/v1alpha1
kind: PushSecret
{{ include "chartpack.metadata" (dict "name" (printf "%s-%s" $fullName $name) "context" $ "extraAnnotations" $config.annotations "extraLabels" $config.labels "syncWaveDefault" "-5" "syncWave" $config.syncWave) }}
spec:
  {{- with $config.push.refreshInterval }}
  refreshInterval: {{ . }}
  {{- end }}
  {{- with $config.push.updatePolicy }}
  updatePolicy: {{ . }}
  {{- end }}
  {{- with $config.push.deletionPolicy }}
  deletionPolicy: {{ . }}
  {{- end }}
  {{- if not $config.push.stores }}{{ fail (printf "Secret '%s' push.stores is required and must not be empty" $name) }}{{ end }}
  secretStoreRefs:
    {{- range $config.push.stores }}
    {{- $store := index $stores . }}
    {{- if not $store }}{{ fail (printf "Secret '%s' push references unknown store '%s' — check integrations.eso.stores" $name .) }}{{ end }}
    - name: {{ $store.name }}
      kind: {{ default "SecretStore" $store.kind }}
    {{- end }}
  selector:
    secret:
      name: {{ printf "%s-%s" $fullName $name }}
  {{- with $config.push.data }}
  data:
    {{- toYaml . | nindent 4 }}
  {{- end }}
{{- end }}
{{- end }}
{{- end }}

{{- if (dig "eso" "enabled" false (default (dict) .Values.integrations)) -}}
{{- $fullName := include "chartpack.fullname" . -}}
{{- $stores := default (dict) (dig "eso" "stores" (dict) .Values.integrations) -}}
{{- range $name, $config := .Values.config.secrets }}
{{- if and $config $config.pull }}
{{- $store := index $stores (required (printf "Secret '%s' pull.store is required" $name) $config.pull.store) }}
{{- if not $store }}{{ fail (printf "Secret '%s' references unknown store '%s' — check integrations.eso.stores" $name $config.pull.store) }}{{ end }}
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
{{ include "chartpack.metadata" (dict "name" (printf "%s-%s" $fullName $name) "context" $ "extraAnnotations" $config.annotations "extraLabels" $config.labels "syncWaveDefault" "-5" "syncWave" $config.syncWave) }}
spec:
  {{- with $config.pull.refreshInterval }}
  refreshInterval: {{ . }}
  {{- end }}
  secretStoreRef:
    name: {{ $store.name }}
    kind: {{ default "SecretStore" $store.kind }}
  target:
    name: {{ printf "%s-%s" $fullName $name }}
    creationPolicy: Merge
    deletionPolicy: Retain
    {{- with (dig "target" "template" nil $config.pull) }}
    template:
      {{- toYaml . | nindent 6 }}
    {{- end }}
  {{- with $config.pull.data }}
  data:
    {{- toYaml . | nindent 4 }}
  {{- end }}
  {{- with $config.pull.dataFrom }}
  dataFrom:
    {{- toYaml . | nindent 4 }}
  {{- end }}
{{- end }}
{{- end }}
{{- end }}

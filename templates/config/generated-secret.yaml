{{- if (dig "eso" "enabled" false (default (dict) .Values.integrations)) -}}
{{- $fullName := include "chartpack.fullname" . -}}
{{- range $secretName, $secretCfg := .Values.config.secrets }}
{{- if and $secretCfg.generate (not $secretCfg.existing) }}

{{- /* Create a Password generator for each key */ -}}
{{- range $keyName, $genCfg := $secretCfg.generate }}
---
apiVersion: generators.external-secrets.io/v1alpha1
kind: Password
{{ include "chartpack.metadata" (dict "name" (printf "%s-%s-%s" $fullName $secretName $keyName) "context" $ "extraAnnotations" $secretCfg.annotations "extraLabels" $secretCfg.labels "syncWaveDefault" "-5" "syncWave" $secretCfg.syncWave) }}
spec:
  length: {{ default 32 $genCfg.length }}
  {{- with $genCfg.digits }}
  digits: {{ . }}
  {{- end }}
  {{- with $genCfg.symbols }}
  symbols: {{ . }}
  {{- end }}
  {{- with $genCfg.symbolCharacters }}
  symbolCharacters: {{ . | quote }}
  {{- end }}
  {{- if not (kindIs "invalid" $genCfg.noUpper) }}
  noUpper: {{ $genCfg.noUpper }}
  {{- end }}
  {{- if not (kindIs "invalid" $genCfg.allowRepeat) }}
  allowRepeat: {{ $genCfg.allowRepeat }}
  {{- end }}
  {{- with $genCfg.encoding }}
  encoding: {{ . }}
  {{- end }}
{{- end }}

{{- /* Create an ExternalSecret that references all generators for this secret */}}
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
{{ include "chartpack.metadata" (dict "name" (printf "%s-%s-gen" $fullName $secretName) "context" $ "extraAnnotations" $secretCfg.annotations "extraLabels" $secretCfg.labels "syncWaveDefault" "-5" "syncWave" $secretCfg.syncWave) }}
spec:
  refreshInterval: {{ default "0" $secretCfg.generateRefreshInterval | quote }}
  target:
    name: {{ printf "%s-%s" $fullName $secretName }}
    creationPolicy: Merge
  dataFrom:
    {{- range $keyName, $genCfg := $secretCfg.generate }}
    - sourceRef:
        generatorRef:
          apiVersion: generators.external-secrets.io/v1alpha1
          kind: Password
          name: {{ printf "%s-%s-%s" $fullName $secretName $keyName }}
      rewrite:
        - regexp:
            source: "password"
            target: {{ $keyName }}
    {{- end }}

{{- end }}
{{- end }}
{{- end }}

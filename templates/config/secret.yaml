{{- range $name, $config := .Values.secrets }}
{{- if $config }}
---
apiVersion: v1
kind: Secret
{{ include "universal-helm.metadata" (dict "name" (printf "%s-%s" (include "universal-helm.fullname" $) $name) "context" $ "extraAnnotations" $config.annotations "extraLabels" $config.labels) }}
type: {{ default "Opaque" $config.type }}
{{- with $config.data }}
data:
  {{- toYaml . | nindent 2 }}
{{- end }}
{{- with $config.stringData }}
stringData:
  {{- toYaml . | nindent 2 }}
{{- end }}
{{- end }}
{{- end }}

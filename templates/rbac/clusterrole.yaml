{{- range $name, $role := .Values.rbac.clusterRoles }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
{{ include "chartpack.metadata" (dict "name" (printf "%s-%s" (include "chartpack.fullname" $) $name) "context" $ "extraAnnotations" $role.annotations "extraLabels" $role.labels "clusterScoped" true) }}
rules:
  {{- toYaml $role.rules | nindent 2 }}
{{- end }}

{{- range $name, $binding := .Values.rbac.clusterRoleBindings }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ printf "%s-%s" (include "universal-helm.fullname" $) $name }}
  labels:
    {{- include "universal-helm.labels" $ | nindent 4 }}
    {{- with $binding.labels }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
  {{- with $binding.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: {{ default "ClusterRole" $binding.roleRef.kind }}
  name: {{ printf "%s-%s" (include "universal-helm.fullname" $) $binding.roleRef.name }}
subjects:
  {{- if $binding.subjects }}
  {{- toYaml $binding.subjects | nindent 2 }}
  {{- else }}
  - kind: ServiceAccount
    name: {{ include "universal-helm.serviceAccountName" $ }}
    namespace: {{ $.Release.Namespace }}
  {{- end }}
{{- end }}

{{- range $name, $binding := .Values.rbac.clusterRoleBindings }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
{{ include "chartpack.metadata" (dict "name" (printf "%s-%s" (include "chartpack.fullname" $) $name) "context" $ "extraAnnotations" $binding.annotations "extraLabels" $binding.labels "clusterScoped" true "syncWaveDefault" "-3" "syncWave" $binding.syncWave) }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: {{ default "ClusterRole" $binding.roleRef.kind }}
  name: {{ printf "%s-%s" (include "chartpack.fullname" $) $binding.roleRef.name }}
subjects:
  {{- if $binding.subjects }}
  {{- toYaml $binding.subjects | nindent 2 }}
  {{- else }}
  - kind: ServiceAccount
    name: {{ include "chartpack.rbac.serviceAccountName" $ }}
    namespace: {{ $.Release.Namespace }}
  {{- end }}
{{- end }}

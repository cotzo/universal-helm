{{- if .Values.serviceAccount.create }}
apiVersion: v1
kind: ServiceAccount
{{ include "chartpack.metadata" (dict "name" (include "chartpack.rbac.serviceAccountName" .) "context" $ "extraAnnotations" .Values.serviceAccount.annotations "extraLabels" .Values.serviceAccount.labels) }}
{{- if not (kindIs "invalid" .Values.serviceAccount.automountServiceAccountToken) }}
automountServiceAccountToken: {{ .Values.serviceAccount.automountServiceAccountToken }}
{{- end }}
{{- with .Values.serviceAccount.imagePullSecrets }}
imagePullSecrets:
  {{- toYaml . | nindent 2 }}
{{- end }}
{{- end }}

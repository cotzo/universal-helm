{{- if eq .Values.workloadType "StatefulSet" }}
apiVersion: apps/v1
kind: StatefulSet
{{ include "universal-helm.metadata" (dict "context" $) }}
spec:
  {{- if not .Values.autoscaling.enabled }}
  replicas: {{ .Values.statefulSet.replicaCount }}
  {{- end }}
  serviceName: {{ include "universal-helm.headlessServiceName" . }}
  {{- with .Values.statefulSet.podManagementPolicy }}
  podManagementPolicy: {{ . }}
  {{- end }}
  {{- with .Values.statefulSet.updateStrategy }}
  updateStrategy:
    {{- toYaml . | nindent 4 }}
  {{- end }}
  {{- with .Values.statefulSet.minReadySeconds }}
  minReadySeconds: {{ . }}
  {{- end }}
  {{- with .Values.statefulSet.revisionHistoryLimit }}
  revisionHistoryLimit: {{ . }}
  {{- end }}
  {{- with .Values.statefulSet.ordinals }}
  ordinals:
    {{- toYaml . | nindent 4 }}
  {{- end }}
  {{- with .Values.statefulSet.persistentVolumeClaimRetentionPolicy }}
  persistentVolumeClaimRetentionPolicy:
    {{- toYaml . | nindent 4 }}
  {{- end }}
  selector:
    matchLabels:
      {{- include "universal-helm.selectorLabels" . | nindent 6 }}
  template:
    {{- include "universal-helm.podTemplate" . | nindent 4 }}
  {{- $vcts := include "universal-helm.storage.volumeClaimTemplates" . }}
  {{- if $vcts }}
  volumeClaimTemplates:
    {{- $vcts | nindent 4 }}
  {{- end }}
{{- end }}

{{- if eq .Values.workloadType "Job" }}
apiVersion: batch/v1
kind: Job
{{ include "universal-helm.metadata" (dict "context" $) }}
spec:
  {{- with .Values.job.backoffLimit }}
  backoffLimit: {{ . }}
  {{- end }}
  {{- with .Values.job.activeDeadlineSeconds }}
  activeDeadlineSeconds: {{ . }}
  {{- end }}
  {{- with .Values.job.ttlSecondsAfterFinished }}
  ttlSecondsAfterFinished: {{ . }}
  {{- end }}
  {{- with .Values.job.completions }}
  completions: {{ . }}
  {{- end }}
  {{- with .Values.job.parallelism }}
  parallelism: {{ . }}
  {{- end }}
  {{- with .Values.job.completionMode }}
  completionMode: {{ . }}
  {{- end }}
  {{- if not (kindIs "invalid" .Values.job.suspend) }}
  suspend: {{ .Values.job.suspend }}
  {{- end }}
  template:
    {{- include "universal-helm.podTemplate" . | nindent 4 }}
{{- end }}

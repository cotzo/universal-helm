{{- if eq .Values.workloadType "CronJob" }}
apiVersion: batch/v1
kind: CronJob
{{ include "chartpack.metadata" (dict "context" $ "workload" true) }}
spec:
  schedule: {{ .Values.workloads.cronJob.schedule | quote }}
  {{- with .Values.workloads.cronJob.timeZone }}
  timeZone: {{ . | quote }}
  {{- end }}
  {{- with .Values.workloads.cronJob.concurrencyPolicy }}
  concurrencyPolicy: {{ . }}
  {{- end }}
  {{- if not (kindIs "invalid" .Values.workloads.cronJob.suspend) }}
  suspend: {{ .Values.workloads.cronJob.suspend }}
  {{- end }}
  {{- with .Values.workloads.cronJob.successfulJobsHistoryLimit }}
  successfulJobsHistoryLimit: {{ . }}
  {{- end }}
  {{- with .Values.workloads.cronJob.failedJobsHistoryLimit }}
  failedJobsHistoryLimit: {{ . }}
  {{- end }}
  {{- with .Values.workloads.cronJob.startingDeadlineSeconds }}
  startingDeadlineSeconds: {{ . }}
  {{- end }}
  jobTemplate:
    spec:
      {{- include "chartpack.workloads.jobSpec" . | nindent 6 }}
      template:
        {{- include "chartpack.podTemplate" . | nindent 8 }}
{{- end }}

{{- if (dig "grafana" "enabled" false (default (dict) .Values.integrations)) -}}
{{- $fullName := include "chartpack.fullname" . -}}
{{- $instances := default (dict) (dig "grafana" "instances" (dict) .Values.integrations) -}}
{{- range $name, $dashboard := .Values.dashboards.grafana }}
{{- if $dashboard }}
{{- if not $dashboard.instances }}{{ fail (printf "Dashboard '%s' requires instances array" $name) }}{{ end }}
{{- range $instName := $dashboard.instances }}
{{- $inst := index $instances $instName }}
{{- if not $inst }}{{ fail (printf "Dashboard '%s' references unknown instance '%s' — check integrations.grafana.instances" $name $instName) }}{{ end }}
---
apiVersion: grafana.integreatly.org/v1beta1
kind: GrafanaDashboard
{{ include "chartpack.metadata" (dict "name" (printf "%s-%s-%s" $fullName $name $instName) "context" $ "extraAnnotations" $dashboard.annotations "extraLabels" $dashboard.labels "syncWaveDefault" "5" "syncWave" $dashboard.syncWave) }}
spec:
  instanceSelector:
    matchLabels:
      {{- toYaml $inst.matchLabels | nindent 6 }}
  {{- with $dashboard.destination }}
  {{- with .folder }}
  folder: {{ . }}
  {{- end }}
  {{- with .folderUID }}
  folderUID: {{ . }}
  {{- end }}
  {{- with .folderRef }}
  folderRef: {{ . }}
  {{- end }}
  {{- with .uid }}
  uid: {{ . }}
  {{- end }}
  {{- end }}
  {{- with $dashboard.resyncPeriod }}
  resyncPeriod: {{ . }}
  {{- end }}
  {{- if not (kindIs "invalid" $dashboard.allowCrossNamespaceImport) }}
  allowCrossNamespaceImport: {{ $dashboard.allowCrossNamespaceImport }}
  {{- end }}
  {{- if not (kindIs "invalid" $dashboard.suspend) }}
  suspend: {{ $dashboard.suspend }}
  {{- end }}
  {{- with $dashboard.source }}
  {{- with .json }}
  json: {{ . | quote }}
  {{- end }}
  {{- with .gzipJson }}
  gzipJson: {{ . }}
  {{- end }}
  {{- with .url }}
  url: {{ . }}
  {{- end }}
  {{- with .urlAuthorization }}
  urlAuthorization:
    {{- toYaml . | nindent 4 }}
  {{- end }}
  {{- if and .configMap .key }}
  configMapRef:
    name: {{ include "chartpack.resolveConfigMapName" (dict "name" .configMap "fullName" $fullName "configMaps" $.Values.config.configMaps) }}
    key: {{ .key }}
  {{- end }}
  {{- with .grafanaCom }}
  grafanaCom:
    {{- toYaml . | nindent 4 }}
  {{- end }}
  {{- with .contentCacheDuration }}
  contentCacheDuration: {{ . }}
  {{- end }}
  {{- end }}
  {{- with $dashboard.datasources }}
  datasources:
    {{- toYaml . | nindent 4 }}
  {{- end }}
  {{- with $dashboard.envs }}
  envs:
    {{- toYaml . | nindent 4 }}
  {{- end }}
  {{- with $dashboard.envFrom }}
  envFrom:
    {{- toYaml . | nindent 4 }}
  {{- end }}
  {{- with $dashboard.plugins }}
  plugins:
    {{- toYaml . | nindent 4 }}
  {{- end }}
{{- end }}
{{- end }}
{{- end }}
{{- end }}
